<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>Hanzi · 汉字</title>
<meta name="robots" content="noindex, nofollow">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Hanzi">
<meta name="theme-color" content="#b4552d">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="manifest" href="manifest.webmanifest">
<style>
:root{
  --bg:#f6f5f2; --card:#ffffff; --ink:#26241f; --ink2:#6b675e; --line:#e5e2da;
  --acc:#b4552d; --acc-soft:#f6e3d9; --ok:#2e9e4f; --ok-soft:#e0f2e5; --bad:#d64541; --bad-soft:#fae3e2;
  --amber:#d98e1f; --t1:#d64541; --t2:#2e9e4f; --t3:#2b7de0; --t4:#9b59b6; --t0:#8a8f98;
  --sh:0 1px 3px rgba(0,0,0,.07),0 4px 14px rgba(0,0,0,.05); --r:16px;
}
@media (prefers-color-scheme: dark){
  :root{ --bg:#17161a; --card:#232227; --ink:#eceae5; --ink2:#a09c93; --line:#37353c;
    --acc:#e0764a; --acc-soft:#3a2a22; --ok:#4cba6e; --ok-soft:#20321f; --bad:#e0605c; --bad-soft:#3a2323;
    --amber:#e0a33e; --t1:#ef7b74; --t2:#5fc983; --t3:#6aa6ef; --t4:#bd87d6; --t0:#8a8f98;
    --sh:0 1px 3px rgba(0,0,0,.4); }
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
  font-size:16px;line-height:1.45;padding-bottom:calc(64px + env(safe-area-inset-bottom))}
header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 6px;max-width:560px;margin:0 auto}
header h1{font-size:18px;margin:0;letter-spacing:.3px}
header h1 span{color:var(--acc)}
.tagline{font-size:12px;color:var(--ink2);margin-top:1px}
.pos{font-size:11px;border:1px solid var(--line);border-radius:6px;padding:1px 6px;color:var(--ink2);vertical-align:2px;margin-left:6px;white-space:nowrap}
#streak{font-size:14px;color:var(--ink2)}
main{max-width:560px;margin:0 auto;padding:8px 14px}
.view{display:none}
.view.on{display:block}
/* ---------- nav ---------- */
nav{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--line);
  display:flex;justify-content:space-around;padding:6px 4px calc(6px + env(safe-area-inset-bottom));z-index:20}
nav button{flex:1;max-width:110px;background:none;border:none;color:var(--ink2);font-size:11px;padding:5px 2px;cursor:pointer;border-radius:10px}
nav button .zi{display:block;font-size:20px;line-height:1.2}
nav button.on{color:var(--acc);background:var(--acc-soft)}
/* ---------- shared ---------- */
.card{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);padding:18px;margin:10px 0}
.btn{display:inline-block;border:none;border-radius:14px;padding:14px 18px;font-size:16px;font-weight:600;cursor:pointer;
  background:var(--acc);color:#fff;min-height:48px}
.btn.line{background:none;border:1.5px solid var(--line);color:var(--ink)}
.btn.ok{background:var(--ok)} .btn.bad{background:var(--bad)}
.btn.sm{padding:8px 14px;min-height:38px;font-size:14px;font-weight:500}
.btn:disabled{opacity:.45}
.muted{color:var(--ink2);font-size:14px}
.t1{color:var(--t1)} .t2{color:var(--t2)} .t3{color:var(--t3)} .t4{color:var(--t4)} .t0{color:var(--t0)}
.spk{background:var(--acc-soft);color:var(--acc);border:none;border-radius:50%;width:40px;height:40px;font-size:18px;cursor:pointer;vertical-align:middle}
.hidden{display:none!important}
.row{display:flex;gap:10px;align-items:center}
.grow{flex:1}
h2{font-size:16px;margin:18px 4px 6px}
/* ---------- learn ---------- */
#learn-status{display:flex;gap:14px;justify-content:center;margin:6px 0;font-size:13px;color:var(--ink2)}
#learn-status b{color:var(--ink)}
.bigchar{font-size:min(38vw,150px);line-height:1.15;text-align:center;margin:6px 0}
.newtag{display:inline-block;background:var(--amber);color:#fff;font-size:12px;font-weight:700;border-radius:8px;padding:2px 8px;margin-bottom:4px}
.pyline{text-align:center;font-size:26px;font-weight:600;margin:2px 0 6px}
.meaning{text-align:center;font-size:19px;margin-bottom:10px}
.comps{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:10px 0}
.comp{background:var(--bg);border:1px solid var(--line);border-radius:12px;padding:5px 10px;font-size:14px}
.comp b{font-size:18px;margin-right:5px;font-weight:500}
.mn{background:var(--acc-soft);border-radius:12px;padding:10px 14px;font-size:15px;margin:10px 0}
.words{margin-top:10px;border-top:1px dashed var(--line);padding-top:8px}
.word{display:flex;align-items:baseline;gap:10px;padding:5px 2px;font-size:15px;cursor:pointer}
.word .wz{font-size:19px}
.word .wp{color:var(--ink2)}
.ansrow{display:flex;gap:12px;margin-top:14px}
.ansrow .btn{flex:1}
.taphint{text-align:center;color:var(--ink2);font-size:13px;margin-top:14px}
.famtag{text-align:center;font-size:13px;color:var(--ink2);margin-bottom:2px}
/* ---------- quiz ---------- */
.modes{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mode{background:var(--card);border:1.5px solid var(--line);border-radius:var(--r);padding:14px;cursor:pointer;text-align:left;font-size:15px;color:var(--ink)}
.mode b{display:block;font-size:16px;margin-bottom:3px}
.qprompt{text-align:center;font-size:20px;margin:14px 0}
.qprompt .bigchar{font-size:min(30vw,110px)}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.opt{background:var(--card);border:1.5px solid var(--line);border-radius:14px;padding:14px 10px;font-size:17px;cursor:pointer;color:var(--ink);min-height:56px}
.opt.zi{font-size:34px}
.opt.right{background:var(--ok-soft);border-color:var(--ok)}
.opt.wrong{background:var(--bad-soft);border-color:var(--bad)}
.qbar{display:flex;justify-content:space-between;align-items:center;font-size:14px;color:var(--ink2);margin:4px 2px}
.expl{margin-top:12px;font-size:14px;color:var(--ink2);text-align:center;min-height:20px}
/* ---------- browse ---------- */
.famhead{display:flex;justify-content:space-between;align-items:baseline;margin:16px 4px 6px}
.famhead h3{margin:0;font-size:16px}
.famhead h3 .zi{color:var(--acc);margin-right:6px;font-size:18px}
.famnote{font-size:12.5px;color:var(--ink2);margin:0 4px 8px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(64px,1fr));gap:8px}
.chip{position:relative;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:10px 2px 8px;font-size:28px;text-align:center;cursor:pointer;color:var(--ink)}
.chip .dot{position:absolute;top:6px;right:6px;width:8px;height:8px;border-radius:50%;background:var(--line)}
.chip.learning .dot{background:var(--amber)}
.chip.mastered .dot{background:var(--ok)}
/* ---------- stats ---------- */
.statgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;text-align:center}
.stat{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);padding:14px 6px}
.stat b{display:block;font-size:26px}
.stat span{font-size:12.5px;color:var(--ink2)}
.setrow{display:flex;justify-content:space-between;align-items:center;padding:12px 2px;border-bottom:1px solid var(--line);font-size:15px}
select,textarea{font:inherit;background:var(--card);color:var(--ink);border:1px solid var(--line);border-radius:10px;padding:8px}
textarea{width:100%;height:90px}
/* ---------- modal ---------- */
#modal{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:flex-end;justify-content:center;z-index:50}
#modal.on{display:flex}
#modal .sheet{background:var(--card);border-radius:20px 20px 0 0;max-width:560px;width:100%;max-height:82vh;overflow-y:auto;padding:20px 18px calc(20px + env(safe-area-inset-bottom))}
#gate{position:fixed;inset:0;background:var(--bg);z-index:100;display:flex;align-items:center;justify-content:center;padding:24px}
#gate .inner{max-width:340px;width:100%;text-align:center}
#gate .bigzi{font-size:64px;margin-bottom:8px;color:var(--acc)}
.toast{position:fixed;bottom:calc(80px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);background:var(--ink);color:var(--bg);
  padding:10px 18px;border-radius:12px;font-size:14px;opacity:0;transition:opacity .25s;z-index:60;pointer-events:none;white-space:nowrap}
.toast.on{opacity:1}
.done{ text-align:center;padding:26px 10px}
.done .big{font-size:44px;margin-bottom:8px}
/* ---------- v2 additions ---------- */
.undo-chip{background:none;border:1px dashed var(--line);border-radius:10px;color:var(--ink2);font-size:12px;padding:3px 10px;cursor:pointer}
.search{width:100%;font:inherit;background:var(--card);color:var(--ink);border:1px solid var(--line);border-radius:12px;padding:11px 14px;margin:6px 0;box-sizing:border-box}
.lvhead{display:flex;align-items:baseline;gap:10px;margin:22px 4px 2px;font-size:17px;font-weight:700}
.lvhead .muted{font-weight:400;font-size:13px}
.lock{background:var(--card);border:1.5px dashed var(--line);border-radius:var(--r);padding:16px;margin:14px 0;text-align:center;color:var(--ink2);font-size:14px}
.sent{background:var(--bg);border:1px solid var(--line);border-radius:12px;padding:10px 12px;margin-top:10px;cursor:pointer}
.sent .sz{font-size:18px;line-height:1.5}
.sent .sp{font-size:12.5px;color:var(--ink2)}
.sent .se{font-size:13.5px;margin-top:2px}
.tonebtn{font-size:17px;letter-spacing:1px}
.sumlist{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin:8px 0}
.sumlist .zi2{font-size:22px;background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:2px 8px}
.card.swipeable{will-change:transform;user-select:none;-webkit-user-select:none;position:relative;touch-action:pan-y}
.sw-tag{position:absolute;top:14px;font-size:15px;font-weight:800;padding:6px 12px;border-radius:10px;opacity:0;pointer-events:none;z-index:3}
.sw-know{left:12px;background:var(--ok);color:#fff}
.sw-nb{right:12px;background:var(--amber);color:#fff}
.hintline{text-align:center;font-size:12.5px;color:var(--ink2);margin:6px 2px 2px}
.scoperow{display:flex;gap:8px;align-items:center;margin:10px 2px 12px;flex-wrap:wrap}
.scope-btn{border:1.5px solid var(--line);background:var(--card);color:var(--ink);border-radius:999px;padding:7px 14px;font-size:13.5px;cursor:pointer}
.scope-btn.on{border-color:var(--acc);background:var(--acc-soft);font-weight:700}
.q-status{display:flex;gap:6px;align-items:center;justify-content:center;margin-top:10px;font-size:19px;color:var(--ink)}
.qs-btn{border:1.5px solid var(--line);background:var(--card);border-radius:10px;padding:5px 9px;font-size:14px;cursor:pointer}
.qs-btn.on{border-color:var(--acc);background:var(--acc-soft)}
.statusrow{display:flex;gap:8px;margin:12px 0 4px}
.statusrow .stbtn{flex:1;padding:10px 4px;border-radius:12px;border:1.5px solid var(--line);background:var(--card);color:var(--ink);font-size:13.5px;cursor:pointer}
.statusrow .stbtn.on{border-color:var(--acc);background:var(--acc-soft);font-weight:700}
.listtoggle{width:100%;text-align:left;background:none;border:none;color:var(--ink);font-size:16px;font-weight:700;padding:14px 16px;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.nb-row{display:flex;gap:12px;align-items:center;padding:10px 2px;border-bottom:1px solid var(--line);cursor:pointer}
.nb-row:last-child{border-bottom:none}
.nb-zi{font-size:30px}
.nb-mid{flex:1;min-width:0;font-size:14.5px}
.nb-note{font-size:13px;color:var(--ink2);font-style:italic;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
</style>
</head>
<body>
<header>
  <div>
    <h1>Han<span>zi</span></h1>
    <div class="tagline">For Leah - happy learning! 💛</div>
  </div>
  <div id="streak"></div>
</header>
<main>
  <!-- LEARN -->
  <section id="view-learn" class="view on">
    <div id="learn-status"></div>
    <div id="learn-area"></div>
  </section>
  <!-- QUIZ -->
  <section id="view-quiz" class="view">
    <div id="quiz-home">
      <h2>Quiz yourself</h2>
      <p class="muted" style="margin:4px">10 questions per round.</p>
      <div id="q-scope"></div>
      <div class="modes">
        <button class="mode" data-mode="c2m"><b>字 → English</b>See the character, pick the meaning</button>
        <button class="mode" data-mode="c2p"><b>字 → Pinyin</b>See the character, pick the sound</button>
        <button class="mode" data-mode="m2c"><b>English → 字</b>See the meaning, pick the character</button>
        <button class="mode" data-mode="a2c" id="mode-audio"><b>🔊 Listening</b>Hear it, pick the character</button>
        <button class="mode" data-mode="w2m"><b>词 Words</b>See a word, pick the meaning</button>
        <button class="mode" data-mode="tone"><b>声 Tones</b>Pick the tone pattern of a word</button>
        <button class="mode" data-mode="comp"><b>部 Components</b>Match parts to their meanings</button>
      </div>
    </div>
    <div id="quiz-play" class="hidden"></div>
  </section>
  <!-- BROWSE -->
  <section id="view-browse" class="view">
    <div id="browse-area"></div>
  </section>
  <!-- STATS -->
  <section id="view-stats" class="view">
    <div id="stats-area"></div>
  </section>
</main>
<nav>
  <button data-view="learn" class="on"><span class="zi">学</span>Learn</button>
  <button data-view="quiz"><span class="zi">测</span>Quiz</button>
  <button data-view="browse"><span class="zi">览</span>Browse</button>
  <button data-view="stats"><span class="zi">我</span>Me</button>
</nav>
<div id="modal"><div class="sheet" id="modal-body"></div></div>
<div class="toast" id="toast"></div>

<script>
/* ================= DATA ================= */
/* f = family index; t = tone (0-4); k = components; mn = mnemonic; w = words */
const FAMS=[
 ["氵","Water","Three drops on the left — these characters involve liquid."],
 ["讠","Speech","A compressed 言 (words) — talking, language, communication."],
 ["心","Heart","心 or squeezed 忄 — feelings and thinking happen in the heart."],
 ["扌","Hand","A squeezed 手 (hand) — actions you do with your hands."],
 ["亻","Person","A squeezed 人 (person) — people and what they do."],
 ["青","Blue-green","青 (qīng) gives its SOUND to a whole family: 请清晴睛情."],
 ["木","Tree","A tree with branches and roots — wood and things built of it."],
 ["日","Sun","A picture of the sun — time, weather, brightness."],
 ["雨","Rain","Raindrops under a cloud — weather from the sky."],
 ["⻊","Foot","A squeezed 足 (foot) — walking, running, roads."],
 ["钅","Metal","A squeezed 金 (gold) — metals and things made of metal."],
 ["火","Fire","Flames (or 灬, fire dots below) — heat and light."],
 ["疒","Sickness","A person leaning on a bed — illness and pain."],
 ["纟","Silk","A twisted thread — string, fabric, and connections."],
 ["口","Mouth","An open mouth — speaking, eating, sounds."],
 ["女","Woman","A kneeling figure — originally 'woman', in many family words."],
 ["门","Gate","Double doors — spaces, openings, in and out."],
 ["✦","Essentials","No single radical — small, high-frequency glue words you'll meet constantly."],
 ["宀","Roof","A roof with a chimney — homes, rooms, and what happens indoors."],
 ["辶","Walk","A foot on a winding road — movement and travel."],
 ["艹","Grass","Two sprouts — plants, vegetables, and things that grow."],
 ["月","Body","Inside characters, 月 is usually 'flesh' — body parts."],
 ["目","Eye","A tall eye — seeing and looking."],
 ["土","Earth","A plant sprouting from the ground — soil, land, places."],
 ["王","King / jade","A string of jade beads — precious things and play."],
 ["车","Vehicle","A cart seen from above — wheels and transport."],
 ["饣","Food","A squeezed 食 (food) — eating and meals."],
 ["衤","Clothes","A squeezed 衣 (clothes) — garments and covering."],
 ["刂","Knife","A squeezed 刀 (knife) — cutting and dividing."],
 ["山","Mountain","Three peaks — mountains and steep places."],
 ["广","Shelter","A roof against a cliff — buildings open on one side: shops, halls."],
 ["阝","City / mound","On the right: city. On the left: hill. Places either way."],
 ["犭","Animal","A squeezed dog — beasts and pets."],
 ["竹","Bamboo","Two bamboo stalks on top — things once made of bamboo: pens, counting rods."],
 ["穴","Cave","A roof over an opening — holes, openings, emptiness."],
 ["页","Head / page","Originally a head — faces; nowadays also pages."],
 ["石","Stone","A cliff with a rock below — hard things."],
 ["田","Field","A divided rice paddy — farmland and boundaries."],
 ["力","Strength","A flexed arm (or a plow) — effort and power."],
 ["又","Right hand","A hand — grabbing, receiving, doing again."],
 ["见","See","An eye on legs — seeing and perceiving."],
 ["贝","Shell / money","A cowrie shell, ancient money — value, cost, wealth."],
 ["礻","Spirit","A squeezed 示 (altar) — gods, rituals, blessings."],
 ["隹","Bird","A short-tailed bird — appears in surprising places."],
 ["尸","Reclining body","A person lying or sitting — bodies, dwellings, layers."],
 ["立","Stand","A person standing on the ground — standing, upright."],
 ["米","Rice","Grains around a cross — rice and powdery things."],
 ["虫","Insect","A crawling creature — bugs, snakes, and small animals."],
 ["鸟","Bird (full)","A perched bird with a claw — bird species."],
 ["马","Horse","A galloping horse — horses and riding."],
 ["皿","Dish","A shallow bowl on a stand — containers."]
];
const DATA=[
/* --- Water 氵 --- */
{c:"河",py:"hé",t:2,m:"river",pos:"noun",f:0,k:[["氵","water"],["可","can (kě)"]],mn:"Water 氵 + 可 'can' — the water that CAN carry boats: a river. 可 also hints at the sound (kě → hé).",w:[["河边","hébiān","riverside"],["黄河","Huánghé","the Yellow River"]]},
{c:"湖",py:"hú",t:2,m:"lake",pos:"noun",f:0,k:[["氵","water"],["胡","hú (sound)"]],mn:"Water 氵 + 胡 which says its name for it: hú. A big calm body of water — a lake.",w:[["西湖","Xīhú","West Lake (Hangzhou)"],["湖水","húshuǐ","lake water"]]},
{c:"海",py:"hǎi",t:3,m:"sea, ocean",pos:"noun",f:0,k:[["氵","water"],["每","every (měi)"]],mn:"Water 氵 + 每 'every' — EVERY river eventually flows into it: the sea.",w:[["大海","dàhǎi","the sea"],["上海","Shànghǎi","Shanghai"]]},
{c:"洗",py:"xǐ",t:3,m:"to wash",pos:"verb",f:0,k:[["氵","water"],["先","first (xiān)"]],mn:"Water 氵 + 先 'first' — FIRST, add water: that's how every wash begins. 先 also hints the sound (xiān → xǐ).",w:[["洗手","xǐshǒu","wash your hands"],["洗澡","xǐzǎo","take a shower/bath"]]},
{c:"游",py:"yóu",t:2,m:"to swim; to tour",pos:"verb",f:0,k:[["氵","water"],["方","flag pole"],["子","child"]],mn:"A child 子 swims through the water 氵 toward the flag 方 — swimming (and touring around).",w:[["游泳","yóuyǒng","to swim"],["旅游","lǚyóu","to travel, tour"]]},
{c:"泳",py:"yǒng",t:3,m:"swimming",pos:"noun",f:0,k:[["氵","water"],["永","forever (yǒng)"]],mn:"Water 氵 + 永 'forever' (same sound yǒng) — you could glide through water forever: swimming.",w:[["游泳","yóuyǒng","to swim"],["泳衣","yǒngyī","swimsuit"]]},
{c:"汽",py:"qì",t:4,m:"steam, vapor",pos:"noun",f:0,k:[["氵","water"],["气","air, gas (qì)"]],mn:"Water 氵 turned to 气 'air' — steam! Same sound as 气 (qì). Steam once powered the first cars.",w:[["汽车","qìchē","car (steam-cart!)"],["汽水","qìshuǐ","soda, fizzy drink"]]},
{c:"深",py:"shēn",t:1,m:"deep",pos:"adjective",f:0,k:[["氵","water"],["木","tree (sunk below)"]],mn:"Water 氵 so deep that a whole tree 木 has sunk under the roof of the surface — deep.",w:[["深海","shēnhǎi","the deep sea"],["深色","shēnsè","dark color"]]},
/* --- Speech 讠 --- */
{c:"话",py:"huà",t:4,m:"speech, words",pos:"noun",f:1,k:[["讠","speech"],["舌","tongue (shé)"]],mn:"Speech 讠 + 舌 'tongue' — what your tongue produces: words, talk.",w:[["说话","shuōhuà","to speak"],["电话","diànhuà","telephone"]]},

function maxLevel(){return Math.ceil(DATA.length/100)}
function lvOf(c){return Math.floor(IDX[c]/100)+1}
function lvChars(n){return DATA.slice((n-1)*100,n*100)}
function lvStarted(n){return lvChars(n).filter(d=>S.prog[d.c]).length}
function lvProgress(n){return lvChars(n).filter(d=>S.prog[d.c]&&S.prog[d.c].box>=2).length}
function unlocked(n){if(n<=1)return true;if(S.forceUnlock[n])return true;return lvProgress(n-1)>=LV_NEED}
function forecast(){
  const eod=new Date();eod.setHours(23,59,59,999);
  const t1=eod.getTime(),t2=t1+864e5,t7=t1+7*864e5;let a=0,b=0,c=0;
  for(const k in S.prog){const due=S.prog[k].due;if(due<=t1)a++;else if(due<=t2)b++;else if(due<=t7)c++}
  return {today:a,tomorrow:b,week:c};
}

/* ================= AUDIO ================= */
let zhVoice=null,ttsOK=false;
function initTTS(){
  if(!("speechSynthesis" in window)){document.getElementById("mode-audio").classList.add("hidden");return}
  const pick=()=>{const vs=speechSynthesis.getVoices();
    zhVoice=vs.find(v=>/^zh([-_]CN)?/i.test(v.lang))||vs.find(v=>/^zh/i.test(v.lang))||null;
    ttsOK=!!zhVoice||vs.length===0; // some webviews list voices lazily; assume ok until proven empty
    document.getElementById("mode-audio").classList.toggle("hidden",!ttsOK);
  };
  pick(); speechSynthesis.onvoiceschanged=pick;
}
function speak(txt){
  if(!S.audio||!("speechSynthesis" in window))return;
  try{speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(txt);
  u.lang="zh-CN";if(zhVoice)u.voice=zhVoice;u.rate=0.8;speechSynthesis.speak(u);}catch(e){}
}

/* ================= HELPERS ================= */
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;")}
function pyHTML(d){return '<span class="t'+d.t+'">'+esc(d.py)+"</span>"}
function toast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("on");clearTimeout(t._h);t._h=setTimeout(()=>t.classList.remove("on"),1800)}
/* status model — the dot IS the notebook: 🟡 in notebook, 🟢 known, ⚪ new */
function stateOf(c){
  if(S.nb[c])return"learning";
  const p=S.prog[c];
  if(p&&(p.box>=MASTER_BOX||p.known))return"mastered";
  if(p)return"learning";
  return"new";
}
function setStatus(c,st){
  if(st==="new"){delete S.prog[c];delete S.nb[c]}
  else if(st==="nb"){
    if(!S.nb[c])S.nb[c]={ts:Date.now(),note:"",n:1};
    const p=S.prog[c];
    if(!p)S.prog[c]={box:1,due:Date.now(),seen:0,ok:0,ng:0};
    else{delete p.known;if(p.box>=MASTER_BOX){p.box=1;p.due=Date.now()}}
  }else{
    const p=S.prog[c]||{};
    delete S.nb[c];
    S.prog[c]={box:6,due:Date.now()+INT[6],seen:p.seen||1,ok:p.ok||1,ng:p.ng||0,known:1};
  }
  save();
}
function fmtDue(ts){const diff=ts-Date.now();if(diff<=0)return"now";const m=Math.round(diff/6e4);if(m<60)return m+" min";const h=Math.round(m/60);if(h<24)return h+" h";return Math.round(h/24)+" d"}

/* distractors: prefer same family, unique by the field shown */
function distract(target,pool,field,n){
  const seen=new Set([target[field]]);const out=[];
  const fam=shuffle(pool.filter(d=>d.f===target.f&&d.c!==target.c));
  const rest=shuffle(pool.filter(d=>d.f!==target.f));
  for(const d of fam.concat(rest)){if(out.length>=n)break;if(seen.has(d[field]))continue;seen.add(d[field]);out.push(d)}
  return out;
}

}

/* ================= LEARN ================= */
let cur=null,curIsNew=false,UNDO=null;
let SES={learned:[],rev:0,missed:new Set()};
function dueList(){const now=Date.now();return Object.keys(S.prog).filter(c=>S.prog[c].due<=now).sort((a,b)=>S.prog[a].due-S.prog[b].due)}
function newList(){const out=[];for(let n=1;n<=maxLevel();n++){if(!unlocked(n))break;lvChars(n).forEach(d=>{if(!S.prog[d.c])out.push(d.c)})}return out}
function paintLearnStatus(){
  const due=dueList().length,nl=newList().length,tc=todayCount();
  document.getElementById("learn-status").innerHTML=
   "<span>Due: <b>"+due+"</b></span><span>New today: <b>"+tc+"/"+quotaMax()+"</b></span><span>Unseen: <b>"+nl+"</b></span>"+
   (UNDO?' <button class="undo-chip" id="b-undo">↩ undo '+UNDO.c+"</button>":"");
  const u=document.getElementById("b-undo");if(u)u.onclick=doUndo;
}
function snapshot(c,wasNew){UNDO={c:c,wasNew:wasNew,prog:S.prog[c]?JSON.parse(JSON.stringify(S.prog[c])):null,nb:S.nb[c]?JSON.parse(JSON.stringify(S.nb[c])):null,todayN:S.today.n,tot:{rev:S.tot.rev,ok:S.tot.ok}}}
function doUndo(){
  if(!UNDO)return;const u=UNDO;
  if(u.prog)S.prog[u.c]=u.prog;else delete S.prog[u.c];
  if(u.nb)S.nb[u.c]=u.nb;else delete S.nb[u.c];
  S.today.n=u.todayN;S.tot.rev=u.tot.rev;S.tot.ok=u.tot.ok;
  if(u.wasNew)SES.learned=SES.learned.filter(x=>x!==u.c);else{SES.rev=Math.max(0,SES.rev-1);SES.missed.delete(u.c)}
  UNDO=null;save();nextCard();toast("Undone — "+u.c+" is back");
}
/* ---------- notebook ---------- */
function nbAdd(c){
  const e=S.nb[c];
  if(e){e.n++;e.ts=Date.now();toast(c+" is in your notebook ("+e.n+"×) 📓")}
  else{S.nb[c]={ts:Date.now(),note:"",n:1};toast(c+" added to notebook 📓")}
  save();
}
/* ---------- swipe engine ---------- */
let SWIPED=false,drag=null;
function swipeFeedback(el,dx){
  const k=el.querySelector(".sw-know"),n=el.querySelector(".sw-nb");
  if(k)k.style.opacity=dx<0?Math.min(1,-dx/55):0;
  if(n)n.style.opacity=dx>0?Math.min(1,dx/55):0;
}
function fly(el,dir,cb){
  el.style.transition="transform .22s ease-in, opacity .22s";
  el.style.transform="translateX("+(dir*window.innerWidth)+"px) rotate("+(dir*14)+"deg)";
  el.style.opacity="0.35";
  setTimeout(cb,200);
}
function bindSwipe(el,onLeft,onRight){
  el.addEventListener("pointerdown",e=>{
    drag={x0:e.clientX,y0:e.clientY,dx:0,on:false,px:e.clientX,pt:e.timeStamp,vx:0};
    if(el.setPointerCapture)try{el.setPointerCapture(e.pointerId)}catch(x){}
  });
  el.addEventListener("pointermove",e=>{
    if(!drag)return;
    const dx=e.clientX-drag.x0,dy=e.clientY-drag.y0;
    if(!drag.on){
      if(Math.abs(dx)>6&&Math.abs(dx)>=Math.abs(dy)){drag.on=true;SWIPED=true}
      else if(Math.abs(dy)>30&&Math.abs(dy)>2*Math.abs(dx)){drag=null;return}
      else return;
    }
    const dt=e.timeStamp-drag.pt;
    if(dt>0)drag.vx=0.7*drag.vx+0.3*((e.clientX-drag.px)/dt);
    drag.px=e.clientX;drag.pt=e.timeStamp;
    drag.dx=dx;
    el.style.transform="translateX("+dx+"px) rotate("+(dx/24)+"deg)";
    swipeFeedback(el,dx);
  });
  const end=()=>{
    if(!drag)return;
    const dx=drag.dx,vx=drag.vx;drag=null;
    setTimeout(()=>SWIPED=false,300);
    const commit=Math.min(64,(el.offsetWidth||320)*0.2);
    if(dx<=-commit||(dx<=-24&&vx<=-0.25))fly(el,-1,onLeft);
    else if(dx>=commit||(dx>=24&&vx>=0.25))fly(el,1,onRight);
    else{el.style.transition="transform .15s";el.style.transform="";swipeFeedback(el,0);setTimeout(()=>el.style.transition="",180)}
  };
  el.addEventListener("pointerup",end);
  el.addEventListener("pointercancel",end);
}
function nextCard(){
  paintLearnStatus();
  const due=dueList();
  if(due.length){cur=byChar(due[0]);curIsNew=false;paintCard();return}
  const nl=newList();
  if(nl.length&&todayCount()<quotaMax()){cur=byChar(nl[0]);curIsNew=true;paintCard();return}
  /* pull recently-missed cards (due within 2 min) back immediately instead of dead-ending */
  const soon=Object.keys(S.prog).filter(c=>S.prog[c].due<=Date.now()+12e4).sort((a,b)=>S.prog[a].due-S.prog[b].due)[0];
  if(soon){cur=byChar(soon);curIsNew=false;paintCard();return}
  cur=null;paintDone(nl.length)
}
const SWTAGS='<div class="sw-tag sw-know">✓ Know it</div><div class="sw-tag sw-nb">📓 Notebook</div>';
function paintCard(){
  const a=document.getElementById("learn-area");
  if(curIsNew){
    a.innerHTML='<div class="hintline">New character! Swipe ← if you already know it · swipe → to add to notebook & learn</div>'+
      '<div class="card swipeable" id="c-card">'+SWTAGS+cardBackHTML(cur,true)+"</div>"+
      '<div class="ansrow"><button class="btn line" id="b-know">← Already know it</button><button class="btn" id="b-learn">Add to notebook →</button></div>';
    const el=document.getElementById("c-card");
    bindSwipe(el,gradeNewKnown,gradeNew);
    document.getElementById("b-know").onclick=gradeNewKnown;
    document.getElementById("b-learn").onclick=gradeNew;
    speak(cur.c);
  }else{
    a.innerHTML='<div class="hintline">Swipe ← I know it · swipe → add to notebook</div>'+
      '<div class="card swipeable" id="c-card">'+SWTAGS+cardBackHTML(cur,false)+"</div>"+
      '<div class="ansrow"><button class="btn ok" id="b-good">← I know it</button><button class="btn bad" id="b-again">Add to notebook →</button></div>';
    const el=document.getElementById("c-card");
    bindSwipe(el,()=>grade(true),()=>{nbAdd(cur.c);grade(false)});
    document.getElementById("b-good").onclick=()=>grade(true);
    document.getElementById("b-again").onclick=()=>{nbAdd(cur.c);grade(false)};
    speak(cur.c);
  }
}
function gradeNewKnown(){
  snapshot(cur.c,true);
  S.prog[cur.c]={box:6,due:Date.now()+INT[6],seen:1,ok:1,ng:0,known:1};
  touchStreak();save();nextCard();
}
function gradeNew(){
  snapshot(cur.c,true);
  todayCount();S.today.n++;
  S.prog[cur.c]={box:1,due:Date.now()+INT[1],seen:1,ok:0,ng:0};
  SES.learned.push(cur.c);
  nbAdd(cur.c);
  touchStreak();save();nextCard();
}
function grade(good){
  snapshot(cur.c,false);
  const p=S.prog[cur.c];p.seen++;S.tot.rev++;
  if(good){p.ok++;S.tot.ok++;p.box=Math.min(6,p.box+1)}else{p.ng++;p.box=Math.max(1,p.box-2)}
  p.due=Date.now()+(good?INT[p.box]:6e5); /* miss → back in 10 min (no instant loop) */
  SES.rev++;if(!good)SES.missed.add(cur.c);
  touchStreak();save();nextCard();
}
function paintDone(newLeft){
  const f=forecast();
  const nexts=Object.keys(S.prog).map(c=>S.prog[c].due).filter(d=>d>Date.now()).sort((a,b)=>a-b)[0];
  let h='<div class="card done"><div class="big">🎉</div><b>All caught up!</b>'+
   '<p class="muted">Later today: '+f.today+" · tomorrow: "+f.tomorrow+" · next 7 days: "+f.week+"</p>"+
   (nexts?'<p class="muted">Next review in '+fmtDue(nexts)+".</p>":"");
  if(SES.learned.length||SES.rev){
    h+='<div style="border-top:1px dashed var(--line);margin-top:10px;padding-top:10px"><b>This session</b>';
    if(SES.learned.length)h+='<p class="muted" style="margin:6px 0 2px">Learned '+SES.learned.length+' new:</p><div class="sumlist">'+SES.learned.map(c=>'<span class="zi2">'+c+"</span>").join("")+"</div>";
    if(SES.rev)h+='<p class="muted" style="margin:6px 0 2px">Reviewed '+SES.rev+" card"+(SES.rev>1?"s":"")+"</p>";
    if(SES.missed.size)h+='<p class="muted" style="margin:6px 0 2px">Tricky ones:</p><div class="sumlist">'+[...SES.missed].map(c=>'<span class="zi2">'+c+"</span>").join("")+"</div>"+
      '<div><button class="btn line" id="b-redrill" style="margin-top:6px">Re-drill these now</button></div>';
    h+="</div>";
  }
  if(newLeft>0)h+='<p style="margin-top:12px"><button class="btn line" id="b-more">+ Learn 5 extra new characters</button></p>';
  h+='<p class="muted" style="margin-top:10px">Or try a Quiz or Browse 👇</p></div>';
  document.getElementById("learn-area").innerHTML=h;
  const m=document.getElementById("b-more");
  if(m)m.onclick=()=>{todayCount();S.today.extra=(S.today.extra||0)+5;save();nextCard();};
  const r=document.getElementById("b-redrill");
  if(r)r.onclick=()=>{SES.missed.forEach(c=>{if(S.prog[c])S.prog[c].due=Date.now()});SES.missed.clear();save();nextCard();};
}

/* ================= QUIZ ================= */
const QLEN=10;
let Q=null,QSCOPE=null;
function seenChars(){return Object.keys(S.prog)}
function defaultScope(){return seenChars().length>=8?"learned":"all"}
function paintScope(){
  if(QSCOPE===null)QSCOPE=defaultScope();
  const el=document.getElementById("q-scope");
  el.innerHTML='<div class="scoperow"><span class="muted" style="font-size:13px">Test scope:</span>'+
   [["all","All"],["learned","Learned"],["notebook","📓 Notebook"]].map(x=>
    '<button class="scope-btn'+(QSCOPE===x[0]?" on":"")+'" data-sc="'+x[0]+'">'+x[1]+"</button>").join("")+"</div>";
  el.querySelectorAll(".scope-btn").forEach(b=>b.onclick=()=>{QSCOPE=b.dataset.sc;paintScope()});
}
function basePool(){
  if(QSCOPE===null)QSCOPE=defaultScope();
  if(QSCOPE==="notebook")return Object.keys(S.nb).map(byChar).filter(Boolean);
  if(QSCOPE==="learned")return seenChars().map(byChar).filter(Boolean);
  const out=[];
  for(let n=1;n<=maxLevel();n++){if(!unlocked(n))break;lvChars(n).forEach(d=>out.push(d))}
  return out;
}
function buildCharMode(mode){
  const pool=basePool();
  return shuffle(pool).slice(0,QLEN).map(t=>{
    const field=mode==="c2p"?"py":(mode==="c2m"?"m":"c");
    const ds=distract(t,DATA,field,3);
    let p,fmt,cls="opt";
    if(mode==="c2m"){p='<div class="qprompt"><div class="bigchar">'+t.c+"</div></div>";fmt=d=>esc(d.m)}
    else if(mode==="c2p"){p='<div class="qprompt"><div class="bigchar">'+t.c+"</div></div>";fmt=d=>'<span class="t'+d.t+'">'+esc(d.py)+"</span>"}
    else if(mode==="m2c"){p='<div class="qprompt">“'+esc(t.m)+'”</div>';fmt=d=>d.c;cls="opt zi"}
    else{p='<div class="qprompt"><button class="spk" style="width:64px;height:64px;font-size:26px" data-say="'+t.c+'">🔊</button><div class="muted" style="font-size:13px;margin-top:6px">tap to replay</div></div>';fmt=d=>d.c;cls="opt zi"}
    return {p:p,opts:shuffle([{h:fmt(t),ok:true}].concat(ds.map(d=>({h:fmt(d),ok:false})))),
      expl:t.c+' <span class="t'+t.t+'">'+esc(t.py)+"</span> — "+esc(t.m),say:(mode==="a2c"?t.c:null),cls:cls,c:t.c};
  });
}
function wordsPool(){
  const out=[],seen=new Set();
  basePool().forEach(d=>d.w.forEach(w=>{if(!seen.has(w[0])){seen.add(w[0]);out.push({wd:w[0],py:w[1],m:w[2],c:d.c})}}));
  return out;
}
function buildW2M(){
  const pool=shuffle(wordsPool());
  if(pool.length<6)return [];
  return pool.slice(0,QLEN).map(t=>{
    const seen=new Set([t.m]);const ds=[];
    for(const o of shuffle(pool)){if(ds.length>=3)break;if(seen.has(o.m))continue;seen.add(o.m);ds.push(o)}
    if(ds.length<3)return null;
    return {p:'<div class="qprompt"><div style="font-size:44px">'+t.wd+"</div></div>",
      opts:shuffle([{h:esc(t.m),ok:true}].concat(ds.map(d=>({h:esc(d.m),ok:false})))),
      expl:t.wd+" "+esc(t.py)+" — "+esc(t.m),say:t.wd,cls:"opt",c:t.c};
  }).filter(Boolean);
}
const TONEMAP={"ā":1,"ē":1,"ī":1,"ō":1,"ū":1,"ǖ":1,"á":2,"é":2,"í":2,"ó":2,"ú":2,"ǘ":2,"ǎ":3,"ě":3,"ǐ":3,"ǒ":3,"ǔ":3,"ǚ":3,"à":4,"è":4,"ì":4,"ò":4,"ù":4,"ǜ":4};
function tonesOf(w){const t=[];for(const ch of w.py)if(TONEMAP[ch])t.push(TONEMAP[ch]);while(t.length<w.wd.length)t.push(0);return t.slice(0,w.wd.length)}
function patLabel(p){return p.map(x=>x===0?"neutral":x).join(" – ")}
function buildTone(){
  const pool=shuffle(wordsPool().filter(w=>/^[一-鿿]{2}$/.test(w.wd)&&!/儿$/.test(w.wd)));
  if(pool.length<5)return [];
  return pool.slice(0,QLEN).map(t=>{
    const cor=tonesOf(t);
    const opts=[{h:patLabel(cor),ok:true}];const seen=new Set([cor.join()]);
    let guard=0;
    while(opts.length<4&&guard++<80){
      const p=cor.map(x=>(x===0&&Math.random()<0.5)?0:Math.floor(Math.random()*4)+1);
      if(!seen.has(p.join())){seen.add(p.join());opts.push({h:patLabel(p),ok:false})}
    }
    if(opts.length<4)return null;
    return {p:'<div class="qprompt"><div style="font-size:50px">'+t.wd+'</div><div class="muted" style="font-size:13px;margin-top:4px">which tone pattern?</div></div>',
      opts:shuffle(opts),expl:t.wd+" "+esc(t.py)+" — "+esc(t.m),say:t.wd,cls:"opt tonebtn",c:t.c};
  }).filter(Boolean);
}
function compPool(){
  const map={};
  basePool().forEach(d=>d.k.forEach(k=>{
    const g=k[0];
    if(g.length>2||/[+ ]/.test(g)||/\(sound\)/.test(k[1]))return;
    if(!map[g])map[g]=k[1].replace(/\s*\(.*?\)\s*/g,"");
  }));
  return Object.keys(map).map(g=>({g:g,m:map[g]}));
}
function compChars(g){return DATA.filter(d=>d.k.some(k=>k[0]===g)).slice(0,6).map(d=>d.c).join(" ")}
function buildComp(){
  const pool=shuffle(compPool());
  if(pool.length<6)return [];
  return pool.slice(0,QLEN).map((t,i)=>{
    const others=shuffle(pool.filter(x=>x.g!==t.g&&x.m!==t.m)).slice(0,3);
    if(others.length<3)return null;
    let p,opts,cls;
    if(i%2===0){
      p='<div class="qprompt"><div class="bigchar" style="font-size:min(26vw,100px)">'+t.g+'</div><div class="muted" style="font-size:13px">what does this component mean?</div></div>';
      opts=shuffle([{h:esc(t.m),ok:true}].concat(others.map(o=>({h:esc(o.m),ok:false}))));cls="opt";
    }else{
      p='<div class="qprompt">Which component means<br>“<b>'+esc(t.m)+'</b>”?</div>';
      opts=shuffle([{h:t.g,ok:true}].concat(others.map(o=>({h:o.g,ok:false}))));cls="opt zi";
    }
    return {p:p,opts:opts,expl:t.g+" — "+esc(t.m)+" · appears in: "+compChars(t.g),cls:cls};
  }).filter(Boolean);
}
function startQuiz(mode){
  let qs;
  if(mode==="w2m")qs=buildW2M();else if(mode==="tone")qs=buildTone();else if(mode==="comp")qs=buildComp();else qs=buildCharMode(mode);
  if(!qs||qs.length<4){toast("Not enough characters in this scope yet — switch scope or study more!");return}
  Q={mode:mode,qs:qs,i:0,score:0};
  document.getElementById("quiz-home").classList.add("hidden");
  document.getElementById("quiz-play").classList.remove("hidden");
  paintQ();
}
function paintQ(){
  const q=Q.qs[Q.i];
  document.getElementById("quiz-play").innerHTML=
   '<div class="qbar"><span>'+(Q.i+1)+" / "+Q.qs.length+'</span><button class="btn sm line" id="q-quit">quit</button></div>'+
   q.p+'<div class="opts">'+q.opts.map((o,i)=>'<button class="'+(q.cls||"opt")+'" data-i="'+i+'">'+o.h+"</button>").join("")+"</div>"+
   '<div class="expl" id="q-expl"></div>';
  document.getElementById("q-quit").onclick=endQuiz;
  if(q.say)speak(q.say);
  document.querySelectorAll("#quiz-play .opt").forEach(b=>b.onclick=()=>answerQ(+b.dataset.i));
}
function qAdvance(){
  if(!Q)return;
  if(Q.timer){clearTimeout(Q.timer);Q.timer=null}
  Q.i++;Q.i>=Q.qs.length?endQuiz(true):paintQ();
}
function qStatusRow(c){
  const map={new:"new",learning:"nb",mastered:"known"};
  const cur=map[stateOf(c)];
  return '<div class="q-status" id="q-status"><span>'+c+"</span>"+
   [["new","⚪"],["nb","🟡"],["known","🟢"]].map(x=>'<button class="qs-btn'+(cur===x[0]?" on":"")+'" data-st="'+x[0]+'">'+x[1]+"</button>").join("")+"</div>";
}
function bindQStatus(c){
  document.querySelectorAll("#q-status .qs-btn").forEach(b=>b.onclick=()=>{
    if(Q&&Q.timer){clearTimeout(Q.timer);Q.timer=null} /* pause auto-advance while editing */
    setStatus(c,b.dataset.st);
    const row=document.getElementById("q-status");
    if(row){row.outerHTML=qStatusRow(c);bindQStatus(c)}
    toast(c+(b.dataset.st==="new"?" → new ⚪":b.dataset.st==="nb"?" → notebook 🟡":" → known 🟢"));
  });
}
function answerQ(i){
  const q=Q.qs[Q.i],right=q.opts[i].ok;
  document.querySelectorAll("#quiz-play .opt").forEach((b,j)=>{
    b.disabled=true;
    if(q.opts[j].ok)b.classList.add("right");else if(j===i)b.classList.add("wrong");
  });
  document.getElementById("q-expl").innerHTML=(q.expl||"")+(q.c?qStatusRow(q.c):"")+
   '<div style="margin-top:10px"><button class="btn sm line" id="q-next">Next →</button></div>';
  if(q.c)bindQStatus(q.c);
  document.getElementById("q-next").onclick=qAdvance;
  if(right){Q.score++}else if(q.c&&S.prog[q.c]){S.prog[q.c].due=Date.now();S.prog[q.c].ng++}
  S.tot.rev++;if(right)S.tot.ok++;
  touchStreak();save();
  Q.timer=right?setTimeout(qAdvance,1300):null; /* misses wait for Next */
}
function endQuiz(showScore){
  if(Q&&Q.timer){clearTimeout(Q.timer);Q.timer=null}
  if(showScore===true){
    document.getElementById("quiz-play").innerHTML=
    '<div class="card done"><div class="big">'+(Q.score>=8?"🏆":Q.score>=5?"👍":"💪")+'</div><b>'+Q.score+" / "+Q.qs.length+'</b><p class="muted">'+
    (Q.score>=8?"Excellent!":Q.score>=5?"Solid — the misses are back in your review queue.":"Tough round — those characters will come back in Learn.")+
    '</p><button class="btn" id="q-again">Another round</button> <button class="btn line" id="q-back">Done</button></div>';
    document.getElementById("q-again").onclick=()=>startQuiz(Q.mode);
    document.getElementById("q-back").onclick=endQuiz;
    return;
  }
  Q=null;
  document.getElementById("quiz-play").classList.add("hidden");
  document.getElementById("quiz-home").classList.remove("hidden");
}

/* ================= PAIRS ================= */
let P=null;
function paintPairsHome(){
  document.getElementById("pairs-list").innerHTML=GROUPS.map(g=>
    '<div style="padding:6px 0;font-size:15px"><span style="font-size:22px;letter-spacing:6px">'+g.join("")+'</span></div>').join("");
}
function startPairs(){
  const qs=[];
  const gs=shuffle(GROUPS);
  while(qs.length<12){
    for(const g of gs){
      if(qs.length>=12)break;
      const target=g[Math.floor(Math.random()*g.length)];
      qs.push({g:g,t:target});
    }
  }
  P={qs:shuffle(qs).slice(0,12),i:0,score:0};
  document.getElementById("pairs-home").classList.add("hidden");
  document.getElementById("pairs-play").classList.remove("hidden");
  paintP();
}
function paintP(){
  const q=P.qs[P.i],ti=info(q.t);
  document.getElementById("pairs-play").innerHTML=
   '<div class="qbar"><span>'+(P.i+1)+" / "+P.qs.length+'</span><button class="btn sm line" id="p-quit">quit</button></div>'+
   '<div class="qprompt">Which one means<br>“<b>'+esc(ti.m)+'</b>”?</div>'+
   '<div class="opts" style="grid-template-columns:repeat('+Math.min(q.g.length,3)+',1fr)">'+
     shuffle(q.g).map(c=>'<button class="opt zi" data-c="'+c+'">'+c+"</button>").join("")+"</div>"+
   '<div class="expl" id="p-expl"></div>';
  document.getElementById("p-quit").onclick=endPairs;
  document.querySelectorAll("#pairs-play .opt").forEach(b=>b.onclick=()=>answerP(b.dataset.c));
}
function answerP(c){
  const q=P.qs[P.i],right=c===q.t;
  document.querySelectorAll("#pairs-play .opt").forEach(b=>{
    b.disabled=true;
    if(b.dataset.c===q.t)b.classList.add("right");else if(b.dataset.c===c)b.classList.add("wrong");
  });
  document.getElementById("p-expl").innerHTML=q.g.map(x=>{const d=info(x);return x+" "+pyHTML(d)+" "+esc(d.m)}).join(" · ");
  if(right)P.score++;else{const p=S.prog[q.t];if(p){p.due=Date.now();p.ng++}}
  touchStreak();save();
  setTimeout(()=>{P.i++;P.i>=P.qs.length?endPairs(true):paintP()},right?1100:2100);
}
function endPairs(showScore){
  if(showScore===true){
    document.getElementById("pairs-play").innerHTML=
    '<div class="card done"><div class="big">'+(P.score>=10?"🦅":"👀")+'</div><b>'+P.score+" / "+P.qs.length+'</b><p class="muted">Sharp eyes!</p>'+
    '<button class="btn" id="p-again">Another round</button> <button class="btn line" id="p-back">Done</button></div>';
    document.getElementById("p-again").onclick=startPairs;
    document.getElementById("p-back").onclick=endPairs;
    return;
  }
  P=null;
  document.getElementById("pairs-play").classList.add("hidden");
  document.getElementById("pairs-home").classList.remove("hidden");
}

/* ================= BROWSE ================= */
const NORM={"ā":"a","á":"a","ǎ":"a","à":"a","ē":"e","é":"e","ě":"e","è":"e","ī":"i","í":"i","ǐ":"i","ì":"i","ō":"o","ó":"o","ǒ":"o","ò":"o","ū":"u","ú":"u","ǔ":"u","ù":"u","ǖ":"v","ǘ":"v","ǚ":"v","ǜ":"v","ü":"v"};
function norm(s){return s.toLowerCase().split("").map(c=>NORM[c]||c).join("")}
function chipHTML(d){return '<button class="chip '+stateOf(d.c)+'" data-c="'+d.c+'">'+d.c+'<span class="dot"></span></button>'}
function paintBrowse(){
  const el=document.getElementById("browse-area");
  el.innerHTML='<input class="search" id="b-q" placeholder="🔍 Search character, pinyin, or meaning…" autocomplete="off"><div id="b-res"></div>';
  const q=document.getElementById("b-q");
  q.oninput=()=>renderBrowse(q.value.trim());
  renderBrowse("");
}
function renderBrowse(query){
  const box=document.getElementById("b-res");let h="";
  if(query){
    const nq=norm(query);
    const hits=DATA.filter(d=>d.c===query||norm(d.py).includes(nq)||d.m.toLowerCase().includes(nq)||
      d.w.some(w=>w[0].includes(query)||norm(w[1]).includes(nq)||w[2].toLowerCase().includes(nq)));
    h=hits.length?('<p class="muted">'+hits.length+" result"+(hits.length>1?"s":"")+'</p><div class="grid">'+hits.map(chipHTML).join("")+"</div>")
      :'<p class="muted">No matches. Try pinyin without tone marks (e.g. “qing”) or an English word.</p>';
  }else{
    for(let n=1;n<=maxLevel();n++){
      if(!unlocked(n)){
        h+='<div class="lock">🔒 <b>Level '+n+"</b><br>Unlocks when "+LV_NEED+" of Level "+(n-1)+" characters are underway (now: "+lvProgress(n-1)+")"+
           '<br><span style="font-size:13px">To unlock now, ask Paul for the passcode!</span>'+
           '<div style="margin-top:8px"><input class="search" style="max-width:160px;display:inline-block;margin:0;padding:8px 12px" placeholder="passcode" id="pw'+n+'" autocomplete="off"> '+
           '<button class="btn sm line b-unlock" data-lv="'+n+'">Unlock</button></div></div>';
        continue;
      }
      const chars=lvChars(n);
      const done=chars.filter(d=>stateOf(d.c)==="mastered").length;
      h+='<div class="lvhead">Level '+n+' <span class="muted">'+lvStarted(n)+" started · "+done+" mastered</span></div>";
      FAMS.forEach((f,fi)=>{
        const list=chars.filter(d=>d.f===fi);
        if(!list.length)return;
        h+='<div class="famhead"><h3><span class="zi">'+f[0]+"</span>"+f[1]+'</h3><span class="muted">'+list.filter(d=>stateOf(d.c)==="mastered").length+"/"+list.length+"</span></div>"+
           '<p class="famnote">'+esc(f[2])+"</p>"+
           '<div class="grid">'+list.map(chipHTML).join("")+"</div>";
      });
    }
    h+='<div class="lock" style="border-style:dotted">✨ More levels to come…</div>';
  }
  box.innerHTML=h;
  box.querySelectorAll(".chip").forEach(b=>b.onclick=()=>openModal(b.dataset.c));
  box.querySelectorAll(".b-unlock").forEach(b=>b.onclick=()=>{
    const n=+b.dataset.lv;
    const inp=document.getElementById("pw"+n);
    const guess=(inp&&inp.value||"").trim().toLowerCase();
    if(guess===PASS[n]){S.forceUnlock[n]=1;save();renderBrowse("");toast("加油! Level "+n+" unlocked 🎉")}
    else toast(guess?"Hmm, that's not it — ask Paul!":"Type the passcode first");
  });
}
function openModal(c){
  const d=byChar(c),p=S.prog[c],nb=S.nb[c],st=stateOf(c);
  const stats=p?('<p class="muted" style="text-align:center">seen '+p.seen+"× · correct "+p.ok+" · missed "+p.ng+" · next review: "+fmtDue(p.due)+"</p>"):'<p class="muted" style="text-align:center">not started yet</p>';
  const cur2st={new:"new",learning:"nb",mastered:"known"};
  const stRow='<div class="statusrow">'+[["new","⚪ New"],["nb","🟡 Notebook"],["known","🟢 Known"]].map(x=>
    '<button class="stbtn'+(cur2st[st]===x[0]?" on":"")+'" data-st="'+x[0]+'">'+x[1]+"</button>").join("")+"</div>";
  const noteUI=nb
   ?('<textarea id="nb-note" placeholder="Your notes — memory tricks, reminders, anything…">'+esc(nb.note||"")+"</textarea>"+
     '<div class="row" style="margin-top:8px"><button class="btn sm" id="nb-save">Save note</button></div>')
   :"";
  document.getElementById("modal-body").innerHTML=cardBackHTML(d,false)+stats+stRow+noteUI+
   '<div class="ansrow"><button class="btn line" id="m-review">Review now</button><button class="btn" id="m-close">Close</button></div>';
  document.getElementById("modal").classList.add("on");
  document.getElementById("m-close").onclick=closeModal;
  document.getElementById("m-review").onclick=()=>{
    if(!S.prog[c])S.prog[c]={box:1,due:Date.now(),seen:0,ok:0,ng:0};else S.prog[c].due=Date.now();
    save();closeModal();switchView("learn");toast(c+" added to review queue");
  };
  document.querySelectorAll("#modal-body .stbtn").forEach(b=>b.onclick=()=>{
    if(cur2st[stateOf(c)]===b.dataset.st)return;
    setStatus(c,b.dataset.st);refreshUnder();openModal(c);
    toast(c+(b.dataset.st==="new"?" reset to new ⚪":b.dataset.st==="nb"?" added to notebook 🟡":" marked as known 🟢"));
  });
  const sv=document.getElementById("nb-save");
  if(sv)sv.onclick=()=>{S.nb[c].note=document.getElementById("nb-note").value.trim();save();refreshUnder();toast("Note saved ✓")};
}
/* repaint whichever view sits under the modal so lists & dots stay fresh */
function refreshUnder(){
  const v=document.querySelector(".view.on");
  if(!v)return;
  if(v.id==="view-stats")paintStats();
  else if(v.id==="view-browse"){const q=document.getElementById("b-q");renderBrowse(q?q.value.trim():"")}
  else if(v.id==="view-learn")paintLearnStatus();
}
function closeModal(){document.getElementById("modal").classList.remove("on")}
document.getElementById("modal").addEventListener("click",e=>{if(e.target.id==="modal")closeModal()});

/* ================= STATS ================= */
let NB_OPEN=false,KN_OPEN=false;
function paintStats(){
  const mastered=DATA.filter(d=>stateOf(d.c)==="mastered").length;
  const learning=DATA.filter(d=>stateOf(d.c)==="learning").length;
  const knownList=DATA.filter(d=>stateOf(d.c)==="mastered");
  const nbk=Object.keys(S.nb).sort((a,b)=>S.nb[b].ts-S.nb[a].ts);
  let lvhtml="";
  for(let n=1;n<=maxLevel();n++){
    const lc=lvChars(n),started=lvStarted(n),mast=lc.filter(d=>stateOf(d.c)==="mastered").length;
    lvhtml+='<div class="setrow"><span>Level '+n+(unlocked(n)?"":" 🔒")+'<br><span class="muted" style="font-size:12.5px">'+started+"/"+lc.length+" started · "+mast+" mastered</span></span></div>";
  }
  document.getElementById("stats-area").innerHTML=
  '<h2>Progress</h2><div class="statgrid">'+
   '<div class="stat"><b style="color:var(--ok)">'+mastered+'</b><span>🟢 known</span></div>'+
   '<div class="stat"><b style="color:var(--amber)">'+learning+'</b><span>🟡 in notebook</span></div>'+
   '<div class="stat"><b>'+(DATA.length-mastered-learning)+'</b><span>⚪ new</span></div></div>'+
  '<div class="card"><div class="row"><span class="grow">🔥 Day streak</span><b>'+S.streak+'</b></div></div>'+
  '<h2>Levels</h2><div class="card">'+lvhtml+'</div>'+
  '<h2>My lists</h2><div class="card" style="padding:0;overflow:hidden">'+
   '<button class="listtoggle" id="t-nb">📓 Notebook ('+nbk.length+')<span>'+(NB_OPEN?"▾":"▸")+"</span></button>"+
   (NB_OPEN?('<div style="padding:0 16px 12px">'+(nbk.length?nbk.map(c=>{
      const d=byChar(c),e=S.nb[c];
      return '<div class="nb-row" data-c="'+c+'"><span class="nb-zi">'+c+'</span><div class="nb-mid"><div>'+pyHTML(d)+" · "+esc(d.m)+"</div>"+(e.note?'<div class="nb-note">'+esc(e.note)+"</div>":"")+"</div>"+(e.n>1?'<span class="muted">'+e.n+"×</span>":"")+"</div>";
     }).join(""):'<p class="muted" style="margin:6px 0">Empty so far — swipe right in Learn on anything you don\'t know.</p>')+"</div>"):"")+
   '<div style="border-top:1px solid var(--line)"></div>'+
   '<button class="listtoggle" id="t-kn">🟢 Known ('+knownList.length+')<span>'+(KN_OPEN?"▾":"▸")+"</span></button>"+
   (KN_OPEN?('<div style="padding:0 16px 14px">'+(knownList.length?('<div class="grid">'+knownList.map(chipHTML).join("")+"</div>"):'<p class="muted" style="margin:6px 0">Swipe left in Learn on characters you already know.</p>')+"</div>"):"")+
  "</div>"+
  '<h2>Settings</h2><div class="card">'+
   '<div class="setrow"><span>New characters per day</span><select id="s-new"><option>5</option><option>8</option><option>12</option><option>20</option></select></div>'+
   '<div class="setrow"><span>Audio (pronunciation)</span><select id="s-audio"><option value="1">on</option><option value="0">off</option></select></div>'+
   (storageOK?"":'<p class="muted">⚠️ This browser is blocking saved progress (private mode?). Use Export below to keep a backup.</p>')+
  '</div>'+
  '<h2>Your data</h2><div class="card">'+
   '<p class="muted" style="margin-top:0">Progress is saved in this browser. Export a backup before switching phones or browsers.</p>'+
   '<div class="row"><button class="btn sm line" id="s-exp">📤 Export</button><button class="btn sm line" id="s-imp">📥 Import</button><span class="grow"></span><button class="btn sm bad" id="s-reset">Reset all</button></div>'+
   '<div id="s-io"></div></div>';
  const sn=document.getElementById("s-new");sn.value=String(S.newPerDay);
  sn.onchange=()=>{S.newPerDay=+sn.value;save();paintLearnStatus()};
  const sa=document.getElementById("s-audio");sa.value=S.audio?"1":"0";
  sa.onchange=()=>{S.audio=sa.value==="1";save()};
  document.getElementById("stats-area").querySelectorAll(".chip").forEach(b=>b.onclick=()=>openModal(b.dataset.c));
  document.getElementById("stats-area").querySelectorAll(".nb-row").forEach(b=>b.onclick=()=>openModal(b.dataset.c));
  document.getElementById("t-nb").onclick=()=>{NB_OPEN=!NB_OPEN;paintStats()};
  document.getElementById("t-kn").onclick=()=>{KN_OPEN=!KN_OPEN;paintStats()};
  document.getElementById("s-exp").onclick=()=>{
    const data=JSON.stringify(S);
    document.getElementById("s-io").innerHTML='<p class="muted">Copy this text and save it anywhere (e.g. a note):</p><textarea id="s-txt" readonly></textarea>';
    const ta=document.getElementById("s-txt");ta.value=data;ta.focus();ta.select();
    if(navigator.clipboard&&navigator.clipboard.writeText)navigator.clipboard.writeText(data).then(()=>toast("Copied to clipboard")).catch(()=>{});
  };
  document.getElementById("s-imp").onclick=()=>{
    document.getElementById("s-io").innerHTML='<p class="muted">Paste your backup text here:</p><textarea id="s-txt"></textarea><button class="btn sm" id="s-doimp" style="margin-top:8px">Load backup</button>';
    document.getElementById("s-doimp").onclick=()=>{
      try{const p=JSON.parse(document.getElementById("s-txt").value);if(!p.prog)throw 0;S=Object.assign(S,p);save();toast("Backup loaded!");paintStats();paintLearnStatus()}
      catch(e){toast("Hmm, that text doesn't look like a backup")}
    };
  };
  document.getElementById("s-reset").onclick=()=>{
    if(confirm("Erase ALL progress? This cannot be undone.")){S={prog:{},nb:{},newPerDay:8,audio:true,streak:0,lastDay:"",today:{day:"",n:0},tot:{rev:0,ok:0},forceUnlock:{}};UNDO=null;SES={learned:[],rev:0,missed:new Set()};save();paintStats();paintStreak();nextCard()}
  };
}

/* ================= NAV ================= */
function switchView(v){
  document.querySelectorAll(".view").forEach(x=>x.classList.remove("on"));
  document.getElementById("view-"+v).classList.add("on");
  document.querySelectorAll("nav button").forEach(b=>b.classList.toggle("on",b.dataset.view===v));
  if(v==="learn")nextCard();
  if(v==="quiz")paintScope();
  if(v==="browse")paintBrowse();
  if(v==="stats")paintStats();
  window.scrollTo(0,0);
}
document.querySelectorAll("nav button").forEach(b=>b.onclick=()=>switchView(b.dataset.view));
document.querySelectorAll(".mode").forEach(b=>b.onclick=()=>startQuiz(b.dataset.mode));
function paintStreak(){document.getElementById("streak").textContent=S.streak>0?("🔥 "+S.streak+" day"+(S.streak>1?"s":"")):""}
/* speaker buttons everywhere (event delegation) */
document.body.addEventListener("click",e=>{
  if(SWIPED)return;
  const el=e.target.closest("[data-say]");
  if(el)speak(el.dataset.say);
});

/* ================= GATE ================= */
function paintGate(){
  if(S.gate)return;
  const g=document.createElement("div");g.id="gate";
  g.innerHTML='<div class="inner"><div class="bigzi">汉</div><h2 style="margin:0 0 6px">你好!</h2>'+
   '<p class="muted">This app was made just for Leah 💛<br>Enter the magic word to come in.</p>'+
   '<input class="search" id="gate-in" placeholder="magic word" autocomplete="off" autocapitalize="none" style="text-align:center">'+
   '<div style="margin-top:10px"><button class="btn" id="gate-go" style="width:100%">Enter</button></div>'+
   '<p class="muted" id="gate-err" style="min-height:18px;font-size:13px;margin-top:8px"></p></div>';
  document.body.appendChild(g);
  const tryGo=()=>{
    const v=(document.getElementById("gate-in").value||"").trim().toLowerCase();
    if(v===GATE){S.gate=1;save();g.remove();toast("欢迎! Welcome in 💛")}
    else document.getElementById("gate-err").textContent=v?"Hmm, that's not it — ask Paul!":"";
  };
  document.getElementById("gate-go").onclick=tryGo;
  document.getElementById("gate-in").addEventListener("keydown",e=>{if(e.key==="Enter")tryGo()});
}
/* ================= BOOT ================= */
load();initTTS();paintStreak();nextCard();paintGate();
/* offline support when hosted (no effect when opened as a local file) */
if("serviceWorker" in navigator&&location.protocol==="https:"){try{navigator.serviceWorker.register("./sw.js")}catch(e){}}
